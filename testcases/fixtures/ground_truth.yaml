# Ground Truth для оценки качества retrieval
# Заполняется вручную на основе реальных запросов и ожидаемых результатов
#
# Как заполнять:
# 1. Выполните запрос: go run cmd/cli/main.go ask "/path/to/vault" "ваш запрос"
# 2. Посмотрите на топ-5 результатов
# 3. Определите, какие чанки ДОЛЖНЫ быть в топ-5 (релевантные)
# 4. Запишите их file_path и section (из вывода программы)
# 5. Установите min_precision_at_5 (например, 0.8 = 4 из 5)

test_cases:
  # ============================================================================
  # Пример 1: North Star
  # ============================================================================
  - name: "North Star keyword search"
    query: "Что такое North Star (Северная звезда)"
    description: "Ищем заметки про North Star - должны найтись чанки с этими словами"
    
    # Список чанков, которые ДОЛЖНЫ попадать в топ-5 результатов
    # Каждый чанк идентифицируется по file_path и (опционально) header_path
    relevant_chunks:
      - file_path: "018_Scripts/words/docs_dev/Парсер русской морфологии.md"
        header_path: ["Финальный План: «Чистый Старт»", "Шаг 2: Подготовка к Гибридному поиску (Research)"]
        # preview для вашей справки - не используется кодом, только для чтения
        preview: "«Начинайте с приёмочных тестов как с „северной звезды“, которая направляет все усилия разработки»"

      - file_path: "018_Scripts/words/docs_dev/Парсер русской морфологии.md"
        header_path: ["Пошаговая инструкция", "Шаг 1: Создание падающего теста (фаза RED)"]
        preview: "«Начинайте с приёмочных тестов как с „северной звезды“, которая направляет все усилия разработки»"
      
      - file_path: "014_Go/25_LGWT/Scaling acceptance tests.md"
        header_path: ["Приемочные тесты как метод разработки ПО"]
        preview: "Он будет твоей путеводной звездой. Всё, на чём нужно сосредоточиться — сделать этот тест зелёным."
      
      - file_path: "014_Go/00 Часы. Go.md"
        header_path: ["Month 8", "week 36"]
        preview: "теперь служит моей «Путеводной звездой» (North Star) для дальнейшей разработки"
    
    # Минимальные пороги для прохождения теста
    # precision@5 = (количество релевантных в топ-5) / 5
    min_precision_at_5: 0.6  # 3 из 5 должны быть релевантны
    
    # Альтернативная запись - минимальное количество релевантных чанков в топ-5
    # min_relevant_in_top_5: 3
    
    # Опционально: паттерны, которые точно НЕ должны попадать в топ-5
    # (помогает отловить ложные срабатывания)
    excluded_patterns:
      - "014_Go/obsidian_rag"  # технические заметки о самом RAG
      - "yarchive/OnePix/"
      - "yarchive/Курс. Управление проектами/"

  # ============================================================================
  # Пример 2: Hebset project
  # ============================================================================
  - name: "Hebset project search"
    query: "Расскажи мне про проект Hebset на котором я была проджект менеджером"
    description: "Ищем информацию о проекте Hebset - тимлайны, задачи, заметки"
    
    relevant_chunks:      
      - file_path: "yarchive/OnePix/Hebset/General/Сборка информации по проекту Hebset.md"
        header_path: ["Паспорт проекта", "Бэкграунд"]
        preview: "Hebset – посреднический сервис между акушерками и медицинскими страховыми компаниями"
      
      - file_path: "yarchive/OnePix/Hebset/Hebset.Grok.md"
        header_path: ["Hebset", "Обзор проекта Hebset"]
        preview: "Hebset — это посреднический сервис между акушерками (фрилансерами) и медицинскими страховыми компаниями в Германии. "

      - file_path: "HNJ/Анализ документации по проектам/hebset/HT.Проект_Hebset_Анализ_для_резюме.md"
        header_path: ["Hebset Project - Резюме и Подготовка к Собеседованию", "6. Готовые Ответы на Вопросы Собеседования", "Q: Какие технические задачи были в проекте?"]
        preview: "Ответ: Я работала проджект-менеджером на проекте Hebset - это биллинговая система для акушерок в Германии."
    
    min_precision_at_5: 0.6  # 4 из 5 должны быть про Hebset

  # ============================================================================
  # Пример 3: Каналы в Go
  # ============================================================================
  
  - name: "Каналы в Go"
    query: "Каналы в Go"
    description: "Ищем информацию, что такое каналы в Go"
    
    relevant_chunks:
      - file_path: "yarchive/Упражнения/Каналы. Упражнения.md"
        preview: "Каналы в Go — это мощный инструмент для взаимодействия между горутинами"

      - file_path: "014_Go/15_goroutines/Channels.md"
        header_path: ["Gemini"]  
        preview: "Каналы (channels) — это один из фундаментальных и самых мощных инструментов в Go для организации **конкурентного программирования**."
     
      - file_path: "014_Go/15_goroutines/Channels.md"
        header_path: ["Grok", "Суть каналов"]  
        preview: "Каналы — это встроенный тип данных в Go, который служит для обмена данными"

      - file_path: "014_Go/25_LGWT/Sync.md"
        header_path: ["Мьютекс или канал в Go?", "Итог для новичка"]
        preview: "Каналы, мьютексы и WaitGroup дополняют друг друга."
    
    min_precision_at_5: 0.6

    excluded_patterns:
      - "yarchive/Keep Calm/"
      - "yarchive/OnePix/"

  # ============================================================================
  # Пример 4: Как удалить контейнер Docker?
  # ============================================================================

  - name: "Как удалить контейнер Docker?"
    query: "Как удалить контейнер Docker?"
    description: "Ищем инструкцию, как удалить контейнер Docker"
    
    relevant_chunks:
      - file_path: "004 Manual/Fedora KDE. Bash.md"
        header_path: ["Docker"] 
        preview: "Удаляет все неиспользуемые Docker-ресурсы (остановленные контейнеры, неиспользуемые сети, образы и кэш) без подтверждения."

      - file_path: "014_Go/08_functions/testcontainers-go.md"
        header_path: ["testcontainers-go — Docker контейнеры в Go-тестах", "Основные операции", "1. Создание контейнера (GenericContainer)"]  # опционально
        preview: "testcontainers-go — это библиотека для запуска настоящих Docker-контейнеров в тестах. Вместо моков и стабов для баз данных, очередей, кешей — ты запускаешь реальные сервисы в контейнерах, тестируешь, и всё автоматически удаляется." 
    
      - file_path: "014_Go/25_LGWT/Practice tasks/goodbye-service. Scaling acceptance tests.md"
        header_path: ["Задание", "Шаг 3: Настройка инфраструктуры (Dockerfile)"]  # опционально
        preview: "библиотека Testcontainers программно управляет всем жизненным циклом Docker"

      - file_path: "004 Manual/2. Создание проекта в VSCode.md"
        header_path: ["Дополнительно"]
        preview: "Чтобы удалить контейнер"

      - file_path: "004 Manual/1. Установка Docker.md"
        header_path: ["Установка Docker", "Проверка установки"]
        preview: "Удалить контейнеры"

    min_precision_at_5: 0.6

    excluded_patterns:
      - "yarchive/Keep Calm/"
      - "yarchive/OnePix/"
      - "yarchive/Курс. Управление проектами/"

# ============================================================================
# Глобальные настройки
# ============================================================================

# Минимальный средний precision@5 по всем тестам
# Если среднее ниже - весь тест считается не пройденным
min_average_precision: 0.6

# Топ-K для оценки (обычно 5, можно изменить)
evaluate_top_k: 5
